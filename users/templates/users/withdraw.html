{% extends 'main.html' %}
{% block content %}
<div class="container mt-4">
    <h2>Withdraw Funds</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Amount:</label>
            <input type="number" name="amount" class="form-control" 
                   step="0.01" min="0.01" required>
        </div>
        <button type="submit" class="btn btn-primary">Withdraw</button>
    </form>
    
    <div class="mt-3">
        <p>Available Balance: ₦{{ request.user.account.balance }}</p>
        <p>Withdrawal Limit: ₦{{ request.user.account.withdrawal_limit }}</p>
        <p>Total Withdrawn: ₦{{ request.user.account.total_withdrawals }}</p>
    </div>
</div>
{% endblock %}
